name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - name: Import every package module
        run: |
          uv run python - <<'EOF'
          import importlib
          import pkgutil

          import mini_networks

          failed = []
          for mod in pkgutil.walk_packages(mini_networks.__path__, "mini_networks."):
              try:
                  importlib.import_module(mod.name)
              except Exception as exc:
                  failed.append(f"{mod.name}: {exc}")
          if failed:
              raise SystemExit("\n".join(failed))
          print("all modules import cleanly")
          EOF

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: make test-ci

  sweep-s:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Non-blocking until Phase 2 stabilization makes the full check sweep green;
    # the uploaded report is the source of truth meanwhile.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - name: S-tier check sweep (all models + compositions)
        run: make validate-s DEVICE=cpu
      - name: Upload sweep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-report
          path: runs/sweep/
          retention-days: 14
          if-no-files-found: ignore
