name: build-train-image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"
      - "infra/gcp/Dockerfile.train"
      - "infra/gcp/entrypoint.sh"
      - ".github/workflows/build-train-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # WIF (no service-account JSON keys)

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_RUNTIME_SA }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/gcp/Dockerfile.train
          push: true
          tags: |
            europe-west1-docker.pkg.dev/garassino-ml/ml-images/mini-networks-train:${{ steps.sha.outputs.short }}
            europe-west1-docker.pkg.dev/garassino-ml/ml-images/mini-networks-train:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # GPU image too — the parallel sweep job runs mini-networks-train-gpu;
      # building only the CPU image left sweeps on stale code.
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/gcp/Dockerfile.train
          push: true
          build-args: |
            TORCH_INDEX=https://download.pytorch.org/whl/cu121
          tags: |
            europe-west1-docker.pkg.dev/garassino-ml/ml-images/mini-networks-train-gpu:${{ steps.sha.outputs.short }}
            europe-west1-docker.pkg.dev/garassino-ml/ml-images/mini-networks-train-gpu:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
