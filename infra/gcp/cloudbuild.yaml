# Builds both train images (CPU + cu121 GPU) into GAR ml-images.
# Submit from the repo root: gcloud builds submit --config infra/gcp/cloudbuild.yaml .
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/gcp/Dockerfile.train
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/ml-images/mini-networks-train:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/gcp/Dockerfile.train
      - --build-arg
      - TORCH_INDEX=https://download.pytorch.org/whl/cu121
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/ml-images/mini-networks-train-gpu:latest
      - .
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/ml-images/mini-networks-train:latest
  - europe-west1-docker.pkg.dev/$PROJECT_ID/ml-images/mini-networks-train-gpu:latest
timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
